#system update using robertdebock.update
---
- name: Update System Packages
  hosts: all
  become: true
  tasks:

    - name: Disable CD-ROM repository to fix apt update errors
      replace:
        path: /etc/apt/sources.list
        regexp: '^(deb cdrom:.*)'
        replace: '# \1'

    - name: Update system packages
      include_role:
        name: robertdebock.update
      vars:
        update_cache: yes
        upgrade: yes
        autoremove: yes
        autoclean: yes
        purge: yes
