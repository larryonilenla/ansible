#system update using robertdebock.update
---
- name: Update System Packages
  hosts: all
  become: true
  tasks:

    - name: Comment out cdrom repository lines using replace
      replace:
        dest: /etc/apt/sources.list
        regexp: '^(deb\s+file:/cdrom.*)$'    # Capture the entire line
        replace: '# \1'                      # Comment it out, preserve content
      become: true
      changed_when: false

    - name: Update system packages
      include_role:
        name: robertdebock.update
      vars:
        update_cache: yes
        upgrade: yes
        autoremove: yes
        autoclean: yes
        purge: yes