#system update using robertdebock.update
---
- name: Update System Packages
  hosts: all
  become: true
  tasks:

    - name: Comment out cdrom repository lines using replace
      replace:
        dest: /etc/apt/sources.list
        regexp: '^(deb (cdrom:|file:/).*)$'    # Capture the entire line
        replace: '# \1'                      # Comment it out, preserve content
      become: true
      changed_when: false

    - name: Forcefully disable the triple-slash CDROM repo
      replace:
        dest: /etc/apt/sources.list
        regexp: '^(deb .*file:///cdrom.*)$'
        replace: '# \1'
      become: yes

    - name: Nuke existing apt lists to clear CDROM errors
      ansible.builtin.file:
        path: /var/lib/apt/lists/
        state: absent
      become: yes

    - name: Recreate empty lists directory
      ansible.builtin.file:
        path: /var/lib/apt/lists/
        state: directory
        mode: '0755'
      become: yes

    - name: Run fresh update to rebuild cache
      ansible.builtin.apt:
        update_cache: yes
      become: yes   

    - name: Update system packages
      include_role:
        name: robertdebock.update
      vars:
        update_cache: yes
        upgrade: yes
        autoremove: yes
        autoclean: yes
        purge: yes