---
- name: Install and configure MongoDB on Linux VMs
  hosts: mongodb_servers      # ← your inventory group
  become: yes
  vars:
    mongodb_version: "7.0"          # or whatever you need
    mongodb_bind_ip: "0.0.0.0"
    mongodb_enable_auth: false      # set to true + add users later

  roles:
    # Install repo + packages (handles Ubuntu, Debian, RHEL, Rocky, etc.)
    - community.mongodb.mongodb_repository
    - community.mongodb.mongodb_install

    # Recommended production tweaks
    - community.mongodb.mongodb_linux
    - community.mongodb.mongodb_selinux   # only needed on RHEL

    # Configure the mongod service
    - community.mongodb.mongodb_mongod

  tasks:
    - name: Ensure MongoDB service is running
      ansible.builtin.service:
        name: mongod
        state: started
        enabled: yes