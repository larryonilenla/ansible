---
- name: Verify Environment
  hosts: localhost
  gather_facts: false
  tasks:
    - name: List all available collections
      command: ansible-galaxy collection list
      register: galaxy_list

    - name: Show installed collections
      debug:
        msg: "{{ galaxy_list.stdout_lines }}"
    
    - name: Check Ansible version
      command: ansible --version
      register: ansible_version

    - name: Show Ansible version
      debug:
        msg: "{{ ansible_version.stdout }}"
    
    - name: Check if Docker python library is installed
      command: pip show docker
      register: pip_check

    - debug:
        msg: "Docker library version: {{ pip_check.stdout_lines[1] }}"